<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#fff" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-app__svg.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/global-styles.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/pwa-banner.css" />
    <title>Страница не найдена</title>
  </head>
  <body>
    <main
      style="
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 16px;
        display: flex;
        flex-direction: column;
        gap: 24px;
        min-height: 100vh;
        justify-content: center;
        align-items: center;
        text-align: center;
        background: var(--grey);
      ">
      <div
        style="
          background: #fff;
          border-radius: 24px;
          box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
          padding: 40px 32px;
          width: 100%;
        ">
        <h1 style="font-size: 2rem; margin: 0 0 16px">
          404&nbsp;&mdash; Страница не&nbsp;найдена
        </h1>
        <p style="margin: 0 0 24px; color: #4f4f4f; line-height: 1.6">
          К&nbsp;сожалению, такой страницы здесь нет. Возможно, ссылка устарела
          или страница была перемещена.
        </p>
        <a
          href="./"
          style="
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 24px;
            background: #ff6d00;
            color: #fff;
            border-radius: 12px;
            font-weight: 400;
            text-decoration: none;
          "
          >Вернуться на&nbsp;главную</a
        >
      </div>
    </main>
  </body>
