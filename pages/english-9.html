<!doctype html>

<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width,initial-scale=1" name="viewport" />
    <meta content="#fff" name="theme-color" />
    <link href="../manifest.webmanifest" rel="manifest" />
    <link href="../css/global-styles.css" rel="stylesheet" />
    <link href="../css/search.css" rel="stylesheet" />
    <link href="../css/subject.css" rel="stylesheet" />
    <link href="../css/english.css" rel="stylesheet" />
    <link href="../css/pwa-banner.css" rel="stylesheet" />
    <link href="../css/speaker-banner.css" rel="stylesheet" />

  <body>
    <nav class="search-shell">
      <div class="search-box" id="search-box">
        <span aria-hidden="true" class="search-box__icon">
          <img src="../icons/zoom.svg" />
        </span>
        <input
          autocomplete="off"
          class="search-box__input font-s"
          id="site-search"
          placeholder="Поиск по шпаргалкам"
          type="search" />
        <button
          aria-label="Очистить поиск"
          class="search-box__clear"
          type="button">
          <img src="../icons/close-circle-grey.svg" />
        </button>
        <div
          aria-live="polite"
          class="search-results"
          hidden=""
          id="search-results"></div>
      </div>
    </nav>

    <header class="header header--subject">
      <div class="header__content">
        <a class="header__return-btn" href="../">
          <img src="../icons/arw-left.svg" />
        </a>
        <div class="header__text">
          <h1 class="header__title font-m">Английский</h1>
          <h2 class="header__subtitle font-s">9 класс</h2>
        </div>
        <div style="visibility: hidden"></div>
      </div>
    </header>

    <div aria-hidden="true" class="page-spacer"></div>

    <main>
      <section
        class="search-results"
        data-grade-band="9"
        data-page="english-9.html"
        data-subject-code="eng"
        id="page-toc"></section>
      <section class="cheats__list">
        <div class="cheats__item" id="item-id">
          <h3 class="cheat__title font-xxl">Заголовок</h3>

          <div class="cheat__content"></div>
        </div>
      </section>
    </main>

    <div aria-hidden="true" class="page-spacer"></div>

    <script src="../js/app.js"></script>
    <script src="../js/search.js"></script>
    <script src="../js/pwa-banner.js"></script>
    <script src="../js/speaker-banner.js" defer></script>
  </body>
</html>
